services:
  - type: web
    name: athlixir-ai-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: HOST
        value: 0.0.0.0
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
      - key: INTERNAL_API_SECRET
        sync: false
      - key: REDIS_HOST
        value: redis-server-host
      - key: REDIS_PORT
        value: 6379
