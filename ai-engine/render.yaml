services:
  - type: web
    name: athlixir-ai-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: HOST
        value: 0.0.0.0
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
      - key: INTERNAL_API_SECRET
        sync: false
      - key: REDIS_HOST
        value: redis-server-host
      - key: REDIS_PORT
        value: 6379
      - key: AI_ENGINE_URL
        value: https://ai-engine-4dn5.onrender.com
      - key: BACKEND_URL
        value: https://backend-n0z5.onrender.com
      - key: CORS_ORIGINS
        value: https://athlixir-product.vercel.app,https://athlixir.vercel.app,https://www.athlixirsports.com,https://athlixirsports.com,https://www.athlixirsports.in,https://athlixirsports.in
