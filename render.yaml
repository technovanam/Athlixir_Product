services:
  - type: web
    name: athlixir-server
    env: docker
    region: ohio # Adjust region as needed
    rootDir: server # Points to the NestJS server folder
    plan: free # Change to pro/starter depending on your needs
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      # Add placeholders for actual env vars
      # - key: DATABASE_URL
      #   sync: false

  - type: web
    name: athlixir-ai-engine
    env: docker
    region: ohio # Adjust region as needed
    rootDir: ai-engine # Points to the FastAPI Python folder
    plan: free
    envVars:
      - key: PORT
        value: 8000
      # - key: OPENAI_API_KEY
      #   sync: false
