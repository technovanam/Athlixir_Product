services:
  - type: web
    name: athlixir-backend
    runtime: node
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FASTAPI_URL
        value: https://athlixir-ai-engine.onrender.com/api/analyze
      - key: FASTAPI_INTEL_URL
        value: https://athlixir-ai-engine.onrender.com/api/analyze/intelligence
      - key: FASTAPI_PUBLIC_URL
        value: https://athlixir-ai-engine.onrender.com
      - key: REDIS_HOST
        value: redis-server-host
      - key: REDIS_PORT
        value: 6379
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: INTERNAL_API_SECRET
        sync: false
