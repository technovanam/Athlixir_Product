name: Server - Build, Test & Deploy to Render

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/server-deploy.yml'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Get PNPM Store Directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup PNPM Cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        working-directory: ./server
        run: pnpm install --frozen-lockfile

      - name: Run Linter
        working-directory: ./server
        run: pnpm lint

      - name: Build Project
        working-directory: ./server
        run: pnpm build
        env:
          NODE_ENV: production
          FASTAPI_URL: http://localhost:8080/api/analyze
          FASTAPI_INTEL_URL: http://localhost:8080/api/analyze/intelligence

      - name: Run Unit Tests
        working-directory: ./server
        run: pnpm test
        env:
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}

      - name: Run E2E Tests
        working-directory: ./server
        run: pnpm test:e2e
        env:
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}

      - name: Generate Coverage Report
        working-directory: ./server
        run: pnpm test:cov
        continue-on-error: true

  deploy:
    name: Deploy to Render
    needs: test
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVER_SERVICE_ID }}
          api-token: ${{ secrets.RENDER_API_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Success
        run: |
          echo "✅ Server deployed to Render successfully!"
          echo "Service: ${{ secrets.RENDER_SERVER_SERVICE_ID }}"
