name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: athlixir-sport
  REGION: asia-south1
  REPOSITORY: athlixir-repo

jobs:
  deploy:
    name: Build & Deploy Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # =====================================================================
      # STEP 1: Build & Deploy AI Engine (FastAPI & MediaPipe)
      # =====================================================================
      - name: Build and Push AI Engine Image
        id: build_ai
        run: |
          OUTPUT=$(gcloud builds submit \
            --async \
            --tag asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/ai-engine:latest \
            ./ai-engine 2>&1)
          BUILD_ID=$(echo "$OUTPUT" | grep -oE "builds/[a-f0-9-]+" | head -n 1 | cut -d'/' -f2)
          echo "AI_BUILD_ID=$BUILD_ID" >> $GITHUB_ENV

      - name: Wait for AI Engine Build
        run: |
          echo "Waiting for AI Engine build ${{ env.AI_BUILD_ID }} to complete..."
          while true; do
            STATUS=$(gcloud builds describe "${{ env.AI_BUILD_ID }}" --format="value(status)")
            echo "Current status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then
              break
            elif [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "INTERNAL_ERROR" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "AI Engine build failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done

      - name: Deploy AI Engine to Cloud Run
        run: |
          gcloud run deploy athlixir-ai \
            --image asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/ai-engine:latest \
            --region ${{ env.REGION }} \
            --platform managed

      # =====================================================================
      # STEP 2: Build & Deploy Backend (NestJS Server)
      # =====================================================================
      - name: Build and Push Backend Image
        id: build_backend
        run: |
          OUTPUT=$(gcloud builds submit \
            --async \
            --tag asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/server:latest \
            ./server 2>&1)
          BUILD_ID=$(echo "$OUTPUT" | grep -oE "builds/[a-f0-9-]+" | head -n 1 | cut -d'/' -f2)
          echo "BACKEND_BUILD_ID=$BUILD_ID" >> $GITHUB_ENV

      - name: Wait for Backend Build
        run: |
          echo "Waiting for Backend build ${{ env.BACKEND_BUILD_ID }} to complete..."
          while true; do
            STATUS=$(gcloud builds describe "${{ env.BACKEND_BUILD_ID }}" --format="value(status)")
            echo "Current status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then
              break
            elif [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "INTERNAL_ERROR" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Backend build failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy athlixir-backend \
            --image asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/server:latest \
            --region ${{ env.REGION }} \
            --platform managed
