name: AI Engine - Test & Deploy to Render

on:
  push:
    branches:
      - main
    paths:
      - 'ai-engine/**'
      - '.github/workflows/ai-engine-deploy.yml'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglib2.0-0 \
            libgomp1 \
            libsm6 \
            libxext6 \
            libxrender-dev

      - name: Install Python Dependencies
        working-directory: ./ai-engine
        run: pip install -r requirements.txt

      - name: Run E2E Tests
        working-directory: ./ai-engine
        run: python scripts/test_pipeline_e2e.py
        env:
          PORT: 8080
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}

      - name: Run Determinism Validation
        working-directory: ./ai-engine
        run: |
          if [ -f scripts/validate_determinism.py ]; then
            python scripts/validate_determinism.py ../test-videos/sprint.mp4 2
          else
            echo "⚠️ Determinism validation script not found"
          fi
        continue-on-error: true

      - name: Lint Python Code
        working-directory: ./ai-engine
        run: |
          pip install pylint
          pylint app/ --disable=all --enable=E,F || true
        continue-on-error: true

  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./ai-engine
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/athlixir-ai-engine:latest
            ${{ secrets.DOCKER_USERNAME }}/athlixir-ai-engine:${{ github.sha }}

  deploy:
    name: Deploy to Render
    needs: build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_AI_ENGINE_SERVICE_ID }}
          api-token: ${{ secrets.RENDER_API_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Success
        run: |
          echo "✅ AI Engine deployed to Render successfully!"
          echo "Service: ${{ secrets.RENDER_AI_ENGINE_SERVICE_ID }}"
